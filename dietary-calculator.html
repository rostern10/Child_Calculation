<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>膳食营养素摄入量计算器</title>
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./styles.css?v=20260625-01" />
  </head>
  <body>
    <div class="page-layout page-layout-compact">
      <aside class="sidebar">
        <div class="sidebar-brand">
          <strong>膳食营养素摄入量计算器</strong>
        </div>

        <nav class="sidebar-nav">
          <a href="./index.html" class="nav-link">儿童营养评估计算器</a>
          <a href="./appendix-index.html" class="nav-link">儿童营养评估附录</a>
          <a href="./dietary-reference-index.html" class="nav-link">膳食营养素参考摄入量附录</a>
          <a href="./dietary-calculator.html" class="nav-link is-current">膳食营养素摄入量计算器</a>
        </nav>
      </aside>

      <main class="content-area content-area-compact">
        <div class="page-shell page-shell-compact">
          <section class="main-card">
            <header class="card-banner">
              <h1>膳食营养素摄入量计算器</h1>
            </header>

            <div class="card-body">
              <div class="section-title">
                <h2>基础信息录入</h2>
                <p>支持按日期自动换算年龄，也支持直接选择年龄段；可覆盖儿童、成人、孕期和乳母的参考摄入量查询。</p>
              </div>

              <form id="dietary-form" class="assessment-form" novalidate>
                <div class="field full-span">
                  <span>录入方式</span>
                  <div class="segmented-row">
                    <label class="segment-option">
                      <input type="radio" name="inputMode" value="date" checked="checked" />
                      <span>按日期计算</span>
                    </label>
                    <label class="segment-option">
                      <input type="radio" name="inputMode" value="bracket" />
                      <span>直接选年龄段</span>
                    </label>
                  </div>
                </div>

                <div class="field full-span">
                  <span>性别</span>
                  <div class="segmented-row">
                    <label class="segment-option">
                      <input type="radio" name="sex" value="male" checked="checked" />
                      <span>男</span>
                    </label>
                    <label class="segment-option">
                      <input type="radio" name="sex" value="female" />
                      <span>女</span>
                    </label>
                  </div>
                </div>

                <div id="date-mode-fields" class="full-span dietary-mode-block">
                  <div class="assessment-form dietary-inner-grid">
                    <div class="field">
                      <span>出生日期</span>
                      <div class="date-select-row">
                        <select id="birth-year" class="date-select" aria-label="出生年份"></select>
                        <select id="birth-month" class="date-select" aria-label="出生月份"></select>
                        <select id="birth-day" class="date-select" aria-label="出生日期"></select>
                      </div>
                      <input id="birth-date" type="hidden" />
                    </div>

                    <div class="field">
                      <span>评估日期</span>
                      <div class="date-select-row">
                        <select id="evaluation-year" class="date-select" aria-label="评估年份"></select>
                        <select id="evaluation-month" class="date-select" aria-label="评估月份"></select>
                        <select id="evaluation-day" class="date-select" aria-label="评估日期"></select>
                      </div>
                      <input id="evaluation-date" type="hidden" />
                    </div>
                  </div>
                </div>

                <div id="bracket-mode-field" class="field full-span hidden">
                  <span>年龄段</span>
                  <select id="age-bracket" class="date-select" aria-label="年龄段"></select>
                </div>

                <div class="field">
                  <span>生理阶段</span>
                  <select id="physiological-status" class="date-select" aria-label="生理阶段">
                    <option value="ordinary">普通</option>
                    <option value="pregEarly">孕早期</option>
                    <option value="pregMid">孕中期</option>
                    <option value="pregLate">孕晚期</option>
                    <option value="lactating">乳母</option>
                  </select>
                  <p id="status-helper" class="helper-text">男仅支持普通；切换为女后可选择孕期和乳母。</p>
                </div>

                <div class="field">
                  <span>体力活动水平</span>
                  <select id="pal-level" class="date-select" aria-label="体力活动水平">
                    <option value="pal1">PAL I 低强度</option>
                    <option value="pal2" selected="selected">PAL II 中等强度</option>
                    <option value="pal3">PAL III 高强度</option>
                  </select>
                </div>

                <div class="field">
                  <span>体重（kg）</span>
                  <input id="weight-kg" type="number" step="0.1" min="0" placeholder="例如 60.0" />
                  <p class="helper-text">0 岁~和 0.5 岁~的能量需要量按体重自动换算。</p>
                </div>

                <div id="menstruation-field" class="field hidden">
                  <span>月经情况</span>
                  <select id="menstruation-status" class="date-select" aria-label="月经情况">
                    <option value="without">无月经</option>
                    <option value="with">有月经</option>
                  </select>
                </div>

                <div class="preview-strip full-span">
                  <div class="preview-item">
                    <span>实际年龄</span>
                    <strong id="preview-age">—</strong>
                  </div>
                  <div class="preview-item">
                    <span>命中年龄段</span>
                    <strong id="preview-bracket">—</strong>
                  </div>
                </div>

                <div class="button-row full-span">
                  <button type="submit" class="primary-btn">开始计算</button>
                  <button id="reset-button" type="button" class="secondary-btn">一键清空</button>
                </div>
              </form>

              <div id="error-box" class="message-box error-box hidden"></div>
            </div>

            <section id="results-section" class="results-panel hidden">
              <div class="result-title section-title">
                <h2>计算结果</h2>
                <p>结果直接在当前卡片内展开显示，可用于快速查看各附表对应的建议摄入量。</p>
              </div>

              <div id="basic-result" class="basic-result"></div>
              <div id="result-groups"></div>
            </section>
          </section>
        </div>
      </main>
    </div>

    <script type="module" src="./dietary-calculator.mjs?v=20260625-01"></script>
  </body>
</html>
