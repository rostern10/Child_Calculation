<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />

    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>附录资料导航</title>
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="./styles.css?v=20260615-17" />
  </head>
  <body>
    <div class="page-layout">
      <aside class="sidebar">
        <div class="sidebar-brand">
          <strong>附录资料</strong>
          <span>7岁以下标准差表分类查看</span>
        </div>

        <nav class="sidebar-nav">
          <a href="./index.html" class="nav-link">主页面</a>
          <a href="#appendix-home" class="nav-link is-current">附录页面</a>
        </nav>
      </aside>

      <main class="content-area">
        <div class="page-shell">
          <section id="appendix-home" class="appendix-panel appendix-page-panel">
            <header class="appendix-page-banner">
              <h1>附录资料导航</h1>
              <p>按 4 个指标分类整理。每个指标页只保留男童、女童两张 7 岁以下总表，便于直接查阅。</p>
            </header>

            <div class="appendix-panel-body">
              <div class="appendix-grid">
                <article class="appendix-card">
                  <span class="appendix-card-tag">营养判断</span>
                  <h3>年龄别体重</h3>
                  <p>用于低体重、重度低体重的判断。</p>
                  <a class="appendix-link" href="./appendix-viewer.html?metric=ageWeight">查看男女总表</a>
                </article>

                <article class="appendix-card">
                  <span class="appendix-card-tag">生长判断</span>
                  <h3>年龄别身长/身高</h3>
                  <p>用于生长迟缓、重度生长迟缓的判断。</p>
                  <a class="appendix-link" href="./appendix-viewer.html?metric=ageHeight">查看男女总表</a>
                </article>

                <article class="appendix-card">
                  <span class="appendix-card-tag">营养判断</span>
                  <h3>身长/身高别体重</h3>
                  <p>用于消瘦、超重、肥胖、重度肥胖的判断。</p>
                  <a class="appendix-link" href="./appendix-viewer.html?metric=weightForLengthHeight">查看男女总表</a>
                </article>

                <article class="appendix-card">
                  <span class="appendix-card-tag">营养判断</span>
                  <h3>年龄别BMI</h3>
                  <p>用于 BMI 相关的消瘦、超重、肥胖判断。</p>
                  <a class="appendix-link" href="./appendix-viewer.html?metric=ageBmi">查看男女总表</a>
                </article>
              </div>
            </div>
          </section>
        </div>
      </main>
    </div>
  </body>
